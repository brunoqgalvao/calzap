name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cal-tracker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      ZAP_GATEWAY_API_KEY: ${{ secrets.ZAP_GATEWAY_API_KEY }}
      ADMIN_PHONE_NUMBER: ${{ secrets.ADMIN_PHONE_NUMBER }}
      WHATSAPP_BUSINESS_NUMBER: ${{ secrets.WHATSAPP_BUSINESS_NUMBER }}
      ADMIN_DASHBOARD_PASSWORD: ${{ secrets.ADMIN_DASHBOARD_PASSWORD }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run Neon migrations
        run: bun run db:migrate:neon

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            OPENAI_API_KEY
            WEBHOOK_SECRET
            ZAP_GATEWAY_API_KEY
            ADMIN_PHONE_NUMBER
            WHATSAPP_BUSINESS_NUMBER
            ADMIN_DASHBOARD_PASSWORD
            NEON_DATABASE_URL
