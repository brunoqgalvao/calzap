name = "cal-tracker"
main = "src/index.ts"
compatibility_date = "2025-12-01"
workers_dev = true
preview_urls = false

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "cal-tracker-media"

[vars]
ACCESS_MODE = "open"

# Secrets (set via `wrangler secret put`):
# OPENAI_API_KEY
# WEBHOOK_SECRET
# ZAP_GATEWAY_API_KEY
# ADMIN_PHONE_NUMBER
# NEON_DATABASE_URL
#
# Optional plain-text vars/secrets:
# WHATSAPP_BUSINESS_NUMBER
# ZAP_GATEWAY_BASE_URL
# ADMIN_DASHBOARD_PASSWORD
